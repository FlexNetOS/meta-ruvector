tempfile = "3.10"
sevensense-benches = { path = "examples/vibecast-7sense/crates/sevensense-benches" }

# Edge-net / crypto deps
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
x25519-dalek = { version = "2.0" }
aes-gcm = { version = "0.10", features = ["aes"] }
sha2 = "0.10"
argon2 = "0.5"
zeroize = { version = "1.7", features = ["derive"] }
hex = "0.4"
base64 = "0.22"
rustc-hash = "2.0"
typed-arena = "2.0"
string_cache = "0.8"

# Hyperbolic HNSW WASM extras
wasm-bindgen-test = "0.3"
console_error_panic_hook = "0.1"
wasm-bindgen-rayon = "1.2"
serde-wasm-bindgen = "0.6"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "unwind"

[profile.bench]
inherits = "release"
debug = true

[profile.dev]
opt-level = 0
debug = true

[profile.test]

# Patch hnsw_rs to use rand 0.8 instead of 0.9 for WASM compatibility
# This resolves the getrandom version conflict (0.2 vs 0.3)
[patch.crates-io]
hnsw_rs = { path = "./patches/hnsw_rs" }
