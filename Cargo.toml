[workspace]
exclude = ["examples/ruvLLM/esp32", "examples/ruvLLM/esp32-flash", "examples/data", "examples/ruvLLM", "examples/delta-behavior",     "crates/micro-hnsw-wasm",  # wasm cdylib shell - needs nightly -Zbuild-std
    "crates/rvf", "crates/rvf/*", "crates/rvf/*/*",
    # ruvector-postgres is a pgrx-based PostgreSQL extension. Its build script
    # requires `$PGRX_HOME` set up via `cargo install cargo-pgrx --version 0.12.9`
    # and `cargo pgrx init`, which downloads and builds multiple Postgres
    # versions. Keep it out of default workspace builds so `cargo build --workspace`
    # works in stock environments. Build it explicitly with `cargo build -p ruvector-postgres`
    # after running pgrx init.
    "crates/ruvector-postgres",
    # Iter 219 (closes ADR-178 Gap E folded into Gap B): the hailo
    # crates rejoined the workspace once the iter-218 ruvector-core
    # path dep + EmbeddingProvider impls landed. The `hailo` feature
    # stays opt-in (only `cargo build --features hailo,cpu-fallback`
    # pulls libhailort + candle), so workspace builds on stock x86
    # still compile without Pi-specific tooling.
    # Vendored [patch.crates-io] override source for hnsw_rs — a patch source is
    # not a workspace member by design (two copies exist for different patch
    # tables); excluded explicitly so it is accounted for, not silently orphaned.
    "patches/hnsw_rs",
    "scripts/patches/hnsw_rs",
    # Standalone docker integration-test harness (ruvector-attention-integration-test);
    # run inside its container, not part of the host `cargo build --workspace`.
    "tests/docker-integration",

    # ruvector-attention-cli / ruvector-sparse-inference-wasm: stale against
    # current ruvector-attention / sparse-model APIs (calls removed methods like
    # ScaledDotProductAttention::compute, SparseModel::{encode,forward_embedding,
    # sparsity_statistics}). They do not compile, so they are excluded rather
    # than added as broken members; re-align to the current APIs, then re-add.
    "crates/ruvector-attention-cli",
    "crates/ruvector-sparse-inference-wasm",
    # Ghost scaffolds DELETED (PR #79) — zero source, only misleading README claiming
    # "30 modules, 24K lines" but had no .rs files. Source was recovered via tarball
    # fetch from GitHub (ruvnet/ruqu) into external/ruqu/. See commit 5f4b65d9f.
    # RVM bare-metal kernel sub-workspace: 14+ crates under crates/rvm/
    # with their own [workspace] + [workspace.package] + [workspace.dependencies].
    # Cannot be added to parent workspace — Cargo rejects nested workspace roots.
]

