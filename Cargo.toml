[workspace.lints.clippy]
unused_unit = "allow"

[workspace.package]
version = "2.2.3"
edition = "2021"
rust-version = "1.77"
license = "MIT"
authors = ["Ruvector Team"]
repository = "https://github.com/FlexNetOS/ruvector"
homepage = "https://github.com/FlexNetOS/ruvector"
documentation = "https://github.com/FlexNetOS/ruvector#readme"
description = "RuVector — cognitive architecture substrate"
keywords = ["ai", "cognitive", "architecture"]
categories = ["science::robotics", "science"]

[workspace.dependencies]
# Cognitum Seed / Cloud SDK (https://cognitum.one/developers).
# Vendored in-tree at `vendor/cognitum-one/` (v0.2.1, MIT, upstream
# `cognitum-one/sdks` @ `a9e1c073`). See `vendor/cognitum-one/VENDORED.md`
# for provenance and update procedure. Crates opt in by listing
# `cognitum-one.workspace = true` in their own `Cargo.toml`. Default features
# enable rustls + the `seed` (LAN appliance) surface; add `mdns` / `stream` /
# `blocking` features per crate as needed.
cognitum-one = { path = "vendor/cognitum-one", default-features = false, features = ["rustls", "seed"] }

# Core functionality
redb = "2.1"
memmap2 = "0.9"
hnsw_rs = "0.3"
simsimd = "5.9"
rayon = "1.10"
crossbeam = "0.8"

# DDS/ROS2 middleware (agentic-robotics cluster)
zenoh = "1"
rustdds = "0.8"
cdr = "0.2"
hdrhistogram = "7.5"

# agentic-robotics-mcp SSE transport (optional deps)
axum = { version = "0.8", features = ["http2"] }
tokio-stream = "0.1"
napi-build = "2.3"
tokio-test = "0.4"

# Robotics internal path deps (required for workspace = true references)
agentic-robotics-core = { path = "crates/agentic-robotics-core", version = "2.2.3" }
agentic-robotics-rt = { path = "crates/agentic-robotics-rt", version = "2.2.3" }
agentic-robotics-node = { path = "crates/agentic-robotics-node", version = "0.1.2" }
agentic-robotics-mcp = { path = "crates/agentic-robotics-mcp", version = "0.1.2" }
agentic-robotics-embedded = { path = "crates/agentic-robotics-embedded", version = "0.1.1" }

# Serialization
rkyv = "0.8"
bincode = { version = "2.0.0-rc.3", features = ["serde"] }
bincode1 = { package = "bincode", version = "1.3" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Node.js bindings
napi = { version = "2.16", default-features = false, features = ["napi9", "async", "tokio_rt"] }
napi-derive = "2.16"

# WASM
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["Worker", "MessagePort", "console"] }
getrandom = { version = "0.3", features = ["wasm_js"] }

# Async runtime
tokio = { version = "1.41", features = ["full"] }
futures = "0.3"

# Error handling and utilities
thiserror = { version = "2.0", default-features = false }
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Math and numerics
nalgebra = { version = "0.34.1", default-features = false, features = ["std"] }
ndarray = "0.16"
approx = "0.5"
rand = "0.8"
rand_distr = "0.4"

# Time and UUID
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.11", features = ["v4", "serde", "js"] }

# CLI
clap = { version = "4.5", features = ["derive", "cargo"] }
indicatif = "0.17"
console = "0.15"

# Testing and benchmarking
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.5"
mockall = "0.13"

# Formal verification
lean-agentic = "=0.1.0"

# Performance
dashmap = "6.1"
parking_lot = "0.12"
once_cell = "1.20"

# Vibecast/sevensense internal deps (path for local dev)
